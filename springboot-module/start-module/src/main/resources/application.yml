server:
  port: 8090
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
      enabled: true

spring:
  application:
    name: springboot-module
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  ai:
    deepseek:
      api-key: ${DEEPSEEK_KEY}
      chat:
        options:
          model: deepseek-chat
  # MySQL 连接配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/personal_workbench
    username: root
    password: 123456
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# MyBatisPlus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
  mapper-locations: classpath*:com/moses/**/mapper/*.xml
  type-aliases-package: com.moses.entity
# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: https://oss-cn-hangzhou.aliyuncs.com
    bucketName: fangqianmin
    region: cn-hangzhou

# 认证功能开关（按部署场景按需关闭）
app:
  auth:
    register-enabled: true
    captcha-on-login: true
    captcha-on-register: true

# Sa-Token 配置
sa-token:
  # token 名称 (同时也是 cookie 名称)
  token-name: rbac_token
  # token 有效期，单位秒 (-1 代表永不过期)
  timeout: 86400
  # token 临时有效期 (指定时间内无操作就视为过期)，单位秒 (-1 代表不启用)
  active-timeout: -1
  # 是否允许同一账号并发登录 (为 true 时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token (为 true 时所有登录共用一个 token)
  is-share: false
  # token 风格 (默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik)
  token-style: uuid
  # 是否输出 Sa-Token 内部日志
  is-log: false
  # 是否从 cookie 中读取 token
  is-read-cookie: false
  # 是否从 header 中读取 token
  is-read-header: true
  # token 前缀 (设置后必须携带 Bearer 前缀)
  token-prefix: Bearer
  # JWT 模式配置 (如果启用 JWT)
  jwt-secret-key: abcdefghijklmnopqrstuvwxyz

# springdoc-openapi（文档引擎；UI 使用 Knife4j doc.html）
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.moses
# 访问地址：http://localhost:8090/doc.html

