name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Aliyun ECS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # scp of deploy/ can wipe server-side .env — backup first, restore after
      - name: Backup server .env
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}/deploy"
            if [[ -f "$DEPLOY_DIR/.env" ]]; then
              cp -a "$DEPLOY_DIR/.env" /tmp/pw.deploy.env.bak
              echo "Backed up existing .env"
            else
              echo "No .env yet on server (first deploy)"
            fi

      - name: Upload code to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "deploy,springboot-module,vue-module,doc,.dockerignore,README.md"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Restore .env, inject secrets, recreate backend
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 45m
          envs: DEEPSEEK_KEY,MYSQL_ROOT_PASSWORD,OSS_ACCESS_KEY_ID,OSS_ACCESS_KEY_SECRET
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}/deploy"
            cd "$DEPLOY_DIR"

            # Restore .env wiped by scp
            if [[ -f /tmp/pw.deploy.env.bak ]]; then
              cp -a /tmp/pw.deploy.env.bak .env
              echo "Restored .env from backup"
            elif [[ ! -f .env ]]; then
              cp .env.example .env
              echo "Created .env from example"
            fi

            # Prefer GitHub Secrets so Key always lands in .env (and then into container)
            upsert_env() {
              local key="$1" val="$2"
              grep -v "^${key}=" .env > .env.tmp || true
              printf '%s=%s\n' "$key" "$val" >> .env.tmp
              mv .env.tmp .env
            }
            if [[ -n "${DEEPSEEK_KEY:-}" ]]; then
              upsert_env DEEPSEEK_KEY "$DEEPSEEK_KEY"
              echo "Wrote DEEPSEEK_KEY into .env from GitHub Secret"
            fi
            if [[ -n "${MYSQL_ROOT_PASSWORD:-}" ]]; then
              upsert_env MYSQL_ROOT_PASSWORD "$MYSQL_ROOT_PASSWORD"
            else
              # appleboy `envs:` exports empty MYSQL_ROOT_PASSWORD when the Secret is unset;
              # Compose prefers shell env over --env-file, so an empty export would wipe the
              # JDBC password at interpolation time (SPRING_DATASOURCE_PASSWORD="").
              unset MYSQL_ROOT_PASSWORD || true
              echo "MYSQL_ROOT_PASSWORD Secret empty — using value already in server .env"
            fi
            # OSS：头像 / 附件上传依赖这两个变量；Secret 为空时必须 unset，避免空导出覆盖服务器 .env
            if [[ -n "${OSS_ACCESS_KEY_ID:-}" ]]; then
              upsert_env OSS_ACCESS_KEY_ID "$OSS_ACCESS_KEY_ID"
              echo "Wrote OSS_ACCESS_KEY_ID into .env from GitHub Secret"
            else
              unset OSS_ACCESS_KEY_ID || true
              echo "OSS_ACCESS_KEY_ID Secret empty — using value already in server .env (if any)"
            fi
            if [[ -n "${OSS_ACCESS_KEY_SECRET:-}" ]]; then
              upsert_env OSS_ACCESS_KEY_SECRET "$OSS_ACCESS_KEY_SECRET"
              echo "Wrote OSS_ACCESS_KEY_SECRET into .env from GitHub Secret"
            else
              unset OSS_ACCESS_KEY_SECRET || true
              echo "OSS_ACCESS_KEY_SECRET Secret empty — using value already in server .env (if any)"
            fi

            # Fail fast if Key still missing
            KEY_VAL="$(grep '^DEEPSEEK_KEY=' .env | cut -d= -f2- | tr -d '\r')"
            if [[ -z "$KEY_VAL" ]]; then
              echo "ERROR: DEEPSEEK_KEY is empty. Add GitHub Secret DEEPSEEK_KEY or keep it in server deploy/.env"
              exit 1
            fi

            # Load .env into this shell so compose ${VAR} interpolation cannot stay empty
            set -a
            # shellcheck disable=SC1091
            source .env
            set +a

            DB_PWD="$(grep '^MYSQL_ROOT_PASSWORD=' .env | cut -d= -f2- | tr -d '\r')"
            if [[ -z "$DB_PWD" ]]; then
              echo "ERROR: MYSQL_ROOT_PASSWORD is empty. Set GitHub Secret or server deploy/.env"
              exit 1
            fi

            OSS_ID_VAL="$(grep '^OSS_ACCESS_KEY_ID=' .env | cut -d= -f2- | tr -d '\r')"
            OSS_SK_VAL="$(grep '^OSS_ACCESS_KEY_SECRET=' .env | cut -d= -f2- | tr -d '\r')"
            if [[ -z "$OSS_ID_VAL" || -z "$OSS_SK_VAL" ]]; then
              echo "WARNING: OSS_ACCESS_KEY_ID / OSS_ACCESS_KEY_SECRET empty — avatar and attachment upload will fail"
              echo "Add GitHub Secrets OSS_ACCESS_KEY_ID + OSS_ACCESS_KEY_SECRET (or set them in server deploy/.env)"
            fi

            # 先拉预览镜像（Hub 无 4.4.0；compose 使用 keking/kkfileview:4.1.0）
            echo "==> Pull kkFileView image"
            docker compose --env-file .env pull kkfileview

            docker compose --env-file .env up -d --build --remove-orphans --force-recreate backend
            docker compose --env-file .env up -d --build --remove-orphans
            docker image prune -f

            echo "==> Verify secrets inside backend container"
            docker compose exec -T backend printenv DEEPSEEK_KEY >/dev/null
            PWD_LEN="$(docker compose exec -T backend sh -c 'printf %s "$SPRING_DATASOURCE_PASSWORD" | wc -c' | tr -d '[:space:]')"
            if [[ "$PWD_LEN" -lt 1 ]]; then
              echo "ERROR: SPRING_DATASOURCE_PASSWORD is empty inside backend container"
              exit 1
            fi
            OSS_ID_LEN="$(docker compose exec -T backend sh -c 'printf %s "$OSS_ACCESS_KEY_ID" | wc -c' | tr -d '[:space:]')"
            OSS_SK_LEN="$(docker compose exec -T backend sh -c 'printf %s "$OSS_ACCESS_KEY_SECRET" | wc -c' | tr -d '[:space:]')"
            echo "DEEPSEEK_KEY present; SPRING_DATASOURCE_PASSWORD length=$PWD_LEN; OSS_ACCESS_KEY_ID length=$OSS_ID_LEN; OSS_ACCESS_KEY_SECRET length=$OSS_SK_LEN"
            if [[ "$OSS_ID_LEN" -lt 1 || "$OSS_SK_LEN" -lt 1 ]]; then
              echo "WARNING: OSS credentials missing inside backend — /user-profile/updateAvatar will fail"
            fi
            docker compose ps

            # 冒烟：对齐本地「能打开站点 + API 通」的最低验收（经 nginx，同 Vite /api 代理）
            HTTP_PORT_VAL="$(grep '^HTTP_PORT=' .env | cut -d= -f2- | tr -d '\r')"
            HTTP_PORT_VAL="${HTTP_PORT_VAL:-80}"
            echo "==> Smoke: GET /api/auth/config via localhost:${HTTP_PORT_VAL}"
            ok=0
            for i in $(seq 1 36); do
              if curl -sf "http://127.0.0.1:${HTTP_PORT_VAL}/api/auth/config" | grep -q '"code":1'; then
                ok=1
                break
              fi
              sleep 5
            done
            if [[ "$ok" -ne 1 ]]; then
              echo "ERROR: smoke check failed — /api/auth/config not healthy"
              docker compose --env-file .env logs backend --tail 80 || true
              exit 1
            fi
            echo "Smoke OK: /api/auth/config returned code=1"

            echo "==> Smoke: kkFileView via /preview"
            preview_ok=0
            for i in $(seq 1 24); do
              code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${HTTP_PORT_VAL}/preview/" || true)"
              if [[ "$code" == "200" || "$code" == "302" || "$code" == "301" ]]; then
                preview_ok=1
                break
              fi
              sleep 5
            done
            if [[ "$preview_ok" -ne 1 ]]; then
              echo "WARNING: /preview not ready (http=$code) — attachment online preview may fail"
              docker compose --env-file .env logs kkfileview --tail 40 || true
            else
              echo "Smoke OK: /preview reachable"
            fi
