name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: springboot-module/pom.xml
      - name: Package
        working-directory: springboot-module
        run: mvn -B -DskipTests package -pl start-module -am

  frontend:
    name: Frontend (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: vue-module/pnpm-lock.yaml
      - name: Install & build
        working-directory: vue-module
        run: |
          pnpm install --frozen-lockfile
          pnpm build
